{% extends 'header.html' %}
{% load static %}
{% block content %}

<!DOCTYPE html>
<html lang="en">

<head>
  <title>Login</title>
</head>

<body class="goto-here">

  <div class="hero-wrap hero-bread" style="background-image: url(&quot;{% static 'images/bg_6.jpg' %}&quot;);">
    <div class="container">
      <div class="row no-gutters slider-text align-items-center justify-content-center">
        <div class="col-md-9 ftco-animate text-center">
          <p class="breadcrumbs"><span class="mr-2"><a href="/">Home</a></span> <span>Login</span></p>
          <h1 class="mb-0 bread">Login</h1>
        </div>
      </div>
    </div>
  </div>

  <section class="ftco-section contact-section bg-light">
    <div class="container">
      <div class="row justify-content-center">
        <div class="col-md-6">

          {% if success %}
          <div class="alert alert-success text-center">{{ success }}</div>
          {% endif %}

          {% if error %}
          <div class="alert alert-danger text-center">{{ error }}</div>
          {% endif %}

          <form action="{% url 'login' %}" method="post" class="bg-white p-5 contact-form"
            onsubmit="return validateLoginForm()">
            {% csrf_token %}

            <div class="form-group">
              <input type="email" class="form-control" placeholder="Email" name="loginemail"
                id="loginemail" value="{{ loginemail }}" onblur="validateLoginEmail(this)">
              <div class="invalid-feedback" id="loginemail-error"></div>
            </div>

            <div class="form-group">
              <input type="password" class="form-control" placeholder="Password"
                name="loginpassword" id="loginpassword" onblur="validateLoginPassword(this)">
              <div class="invalid-feedback" id="loginpassword-error"></div>
            </div>

            <div class="form-group">
              <input type="submit" value="Login" class="btn btn-primary py-3 px-5">
            </div>
            <p class="text-center mt-3">Don't have an account? <a href="{% url 'signup' %}">Register</a></p>
          </form>
        </div>
      </div>
    </div>
  </section>

<script>
  function showError(input, errorId, message) {
    input.classList.add('is-invalid');
    document.getElementById(errorId).textContent = message;
  }

  function clearError(input, errorId) {
    input.classList.remove('is-invalid');
    document.getElementById(errorId).textContent = '';
  }

  function validateLoginEmail(input) {
    if (input.value.trim() === '') {
      showError(input, 'loginemail-error', 'Email is required.'); return false;
    } else if (!/^[\w\.-]+@[\w\.-]+\.\w{2,}$/.test(input.value.trim())) {
      showError(input, 'loginemail-error', 'Enter a valid email address.'); return false;
    } else {
      clearError(input, 'loginemail-error'); return true;
    }
  }

  function validateLoginPassword(input) {
    if (input.value === '') {
      showError(input, 'loginpassword-error', 'Password is required.'); return false;
    } else {
      clearError(input, 'loginpassword-error'); return true;
    }
  }

  function validateLoginForm() {
    var email    = validateLoginEmail(document.getElementById('loginemail'));
    var password = validateLoginPassword(document.getElementById('loginpassword'));
    return email && password;
  }
</script>

</body>

</html>
{% endblock %}
