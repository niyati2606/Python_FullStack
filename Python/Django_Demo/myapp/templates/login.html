{% extends 'header.html' %}
{% block content %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
        <style>
        span {
            color: red;
        }
        tr,
        td {
            padding: 10px;
        }
    </style>

</head>
<body>
    {% if msg %}
        <b style="color: blue;">{{msg}}</b>
    {% endif %}
    <form name="contact" method="post" action="{% url 'login' %}" enctype="multipart/form-data">
        {% csrf_token %}
        <table>
            <tr>
                <td>Email</td>
                <td><input type="text" name="email"></td>
            </tr>
            <tr>
                <td>Password</td>
                <td><input type="password" name="password"></td>
            </tr>
            <tr>
                <td colspan="2" align="center">
                    <input type="submit" value="Login" class="btn btn-primary">
                </td>
            </tr>
        </table>
    </form>
    
</body>
</html>
{% endblock %}
