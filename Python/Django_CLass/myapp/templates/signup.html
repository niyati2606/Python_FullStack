{% extends 'header.html' %}
{% block content %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        span{
            color: red;
        }
    </style>
    <script type="text/javascript">
        function checkFname()
        {
            var f=document.contact.fname.value;
            var reg=/^[A-Za-z]+$/;
            if(f=="")
            {
                document.getElementById("fname").innerHTML="Please Enter First Name";
            }
            else if(!reg.test(f))
            {
                document.getElementById("fname").innerHTML="Please Enter Only Alphabets";
            }
            else
            {
                document.getElementById("fname").innerHTML="";
            }
        }
        function checkEmail()
        {
            var f=document.contact.email.value;
            var reg=/^[A-Za-z0-9-_.]+@[A-Za-z]+\.[A-Za-z]{2,4}$/;
            if(f=="")
            {
                document.getElementById("email").innerHTML="Please Enter Email";
            }
            else if(!reg.test(f))
            {
                document.getElementById("email").innerHTML="Please Enter Valid Email";
            }
            else
            {
                document.getElementById("email").innerHTML="";
            }
        }
        function checkMobile()
        {
            var f=document.contact.mobile.value;
            var reg=/^\d{10}$/;
            if(f=="")
            {
                document.getElementById("mobile").innerHTML="Please Enter Mobile";
            }
            else if(!reg.test(f))
            {
                document.getElementById("mobile").innerHTML="Please Enter 10 Digits Only";
            }
            else
            {
                document.getElementById("mobile").innerHTML="";
            }
        }
    </script>
</head>
<body>
    {% if msg %}
        <b style="color: blue;">{{msg}}</b>
    {% endif %}
    <form name="contact" method="post" action="{% url 'signup' %}" enctype="multipart/form-data">
        {% csrf_token %}
        <table>
            <tr>
                <td>First Name</td>
                <td><input type="text" name="fname" onblur="checkFname();"></td>
                <td><span id="fname"></span></td>
            </tr>
            <tr>
                <td>Last Name</td>
                <td><input type="text" name="lname"></td>
            </tr>
            <tr>
                <td>Email</td>
                <td><input type="text" name="email" onblur="checkEmail();"></td>
                <td><span id="email"></span></td>
            </tr>
            <tr>
                <td>Mobile</td>
                <td><input type="text" name="mobile" onblur="checkMobile();"></td>
                <td><span id="mobile"></span></td>
            </tr>
            <tr>
                <td>Address</td>
                <td><textarea rows="5" cols="22" name="address"></textarea></td>
            </tr>
            <tr>
                <td>Profile Picture</td>
                <td><input type="file" name="profile_picture"></td>
            </tr>
            <tr>
                <td>Password</td>
                <td><input type="password" name="password"></td>
            </tr>
            <tr>
                <td>Confirm Password</td>
                <td><input type="password" name="cpassword"></td>
            </tr>
            <tr>
                <td colspan="2" align="center">
                    <input type="submit" value="Sign Up" class="btn btn-primary">
                </td>
            </tr>
        </table>
    </form>
    
</body>
</html>
{% endblock %}
